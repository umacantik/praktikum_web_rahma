<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position CSS</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        padding: 30px;
      }

      h1 {
        text-align: center;
      }

      h2 {
        margin-top: 50px;
      }

      #box1 {
        width: 300px;
        height: 300px;
        background: green;
      }

      #box2 {
        width: 300px;
        height: 300px;
        background: blue;
        position: relative;
        top: 20px;
        left: 50px;
        margin-bottom: 40px;
      }

      #box3 {
        width: 300px;
        height: 300px;
        background: green;
        position: relative;
      }

      #box4 {
        width: 70px;
        height: 70px;
        background: yellow;
        position: absolute;
        top: 20px;
        left: 20px;
      }
    </style>
  </head>
  <body>
    <a href="portofolio.html">⬅ Kembali</a><br />
    <h1>Belajar Position CSS</h1>

    <h2>Static</h2>
    <div id="box1"></div>

    <h2>Relative</h2>
    <div id="box2"></div>

    <h2>Absolute</h2>
    <div id="box3">
      <div id="box4"></div>
    </div>
  </body>
</html>
